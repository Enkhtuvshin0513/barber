<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{subject}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        font-family: Arial, sans-serif;
      }
      .wrapper {
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .header {
        background-color: #1a1a1a;
        padding: 32px 40px;
        text-align: center;
      }
      .header h1 {
        color: #ffffff;
        margin: 0;
        font-size: 24px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .header span {
        color: #c9a84c;
      }
      .content {
        padding: 40px;
        color: #333333;
        font-size: 15px;
        line-height: 1.7;
      }
      .content h2 {
        color: #1a1a1a;
        font-size: 20px;
        margin-top: 0;
      }
      .footer {
        background-color: #f9f9f9;
        padding: 20px 40px;
        text-align: center;
        font-size: 12px;
        color: #999999;
        border-top: 1px solid #eeeeee;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <h1>Barber <span>Shop</span></h1>
      </div>
      <div class="content">
        <h2>{{subject}}</h2>
        <p>{{body}}</p>
      </div>
      <div class="footer">
        <p>&copy; {{year}} Barber Shop. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
